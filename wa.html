<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Quick</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background-color: #0a0f0a !important;
min-height: 100vh;
color: #e8f5e8;
font-family: ‘Courier New’, Courier, monospace;
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
}

.card {
width: 100%;
max-width: 400px;
background-color: #111811;
border: 1px solid #1f2e1f;
border-radius: 8px;
padding: 36px 28px 28px;
}

.logo {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 32px;
}

.logo-icon { width: 38px; height: 38px; flex-shrink: 0; }

.logo-text {
font-size: 24px;
font-weight: 900;
color: #25d366;
letter-spacing: -0.5px;
}

.logo-text span { color: #5a7a5a; }

label {
display: block;
font-size: 10px;
letter-spacing: 2.5px;
text-transform: uppercase;
color: #5a7a5a;
margin-bottom: 10px;
}

.input-row {
display: flex;
border: 1px solid #1f2e1f;
border-radius: 6px;
overflow: hidden;
background-color: #0d140d;
transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
border-color: #1a9e4a;
box-shadow: 0 0 0 3px rgba(37,211,102,0.12);
}

.country-select {
background-color: #0d140d;
border: none;
border-right: 1px solid #1f2e1f;
color: #25d366;
font-family: ‘Courier New’, Courier, monospace;
font-size: 13px;
padding: 14px 8px 14px 12px;
cursor: pointer;
outline: none;
width: 110px;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}

.country-select option {
background-color: #0d140d;
color: #e8f5e8;
}

.phone-input {
flex: 1;
background-color: transparent;
border: none;
color: #e8f5e8;
font-family: ‘Courier New’, Courier, monospace;
font-size: 16px;
padding: 14px 14px;
outline: none;
-webkit-appearance: none;
appearance: none;
width: 100%;
}

.phone-input::placeholder { color: #2e4a2e; }

.phone-input::-webkit-outer-spin-button,
.phone-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.phone-input[type=number] { -moz-appearance: textfield; }

.hint { font-size: 11px; color: #3a5a3a; margin-top: 8px; }

.error {
font-size: 11px;
color: #ff6b6b;
margin-top: 8px;
min-height: 16px;
display: none;
}
.error.show { display: block; }

.btn {
margin-top: 22px;
width: 100%;
padding: 16px;
background-color: #25d366;
color: #021005;
border: none;
border-radius: 6px;
font-family: ‘Courier New’, Courier, monospace;
font-size: 15px;
font-weight: 700;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
-webkit-appearance: none;
appearance: none;
}

.btn:active { background-color: #1db954; transform: scale(0.98); }
.btn svg { width: 20px; height: 20px; flex-shrink: 0; }

.footer {
margin-top: 24px;
padding-top: 18px;
border-top: 1px solid #1a2a1a;
font-size: 10px;
color: #2e4a2e;
letter-spacing: 1.5px;
text-align: center;
text-transform: uppercase;
}
</style>

<script>
  const phoneInput = document.getElementById('phone');
  const errorEl = document.getElementById('error');

  phoneInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') openWhatsApp();
  });

  phoneInput.addEventListener('input', () => {
    errorEl.classList.remove('show');
  });

  function openWhatsApp() {
    const code = document.getElementById('countryCode').value;
    const number = phoneInput.value.trim().replace(/\D/g, '');
    if (!number || number.length < 5) {
      errorEl.classList.add('show');
      phoneInput.focus();
      return;
    }
    window.open('https://wa.me/' + code + number, '_blank');
  }
</script>
